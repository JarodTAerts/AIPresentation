<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- AI Presentation favicon: friendly robot head in phosphor green on dark background -->
  <rect width="64" height="64" rx="12" fill="#0B0F1A"/>

  <!-- Antenna -->
  <line x1="32" y1="6" x2="32" y2="14" stroke="#5BE9B9" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="32" cy="6" r="3" fill="#5BE9B9"/>

  <!-- Head -->
  <rect x="12" y="14" width="40" height="34" rx="7"
        fill="#11172A" stroke="#5BE9B9" stroke-width="2.5"/>

  <!-- Eyes -->
  <circle cx="23" cy="29" r="4" fill="#5BE9B9"/>
  <circle cx="41" cy="29" r="4" fill="#5BE9B9"/>
  <circle cx="23" cy="29" r="1.5" fill="#0B0F1A"/>
  <circle cx="41" cy="29" r="1.5" fill="#0B0F1A"/>

  <!-- Mouth / speaker grille -->
  <rect x="22" y="38" width="20" height="5" rx="2"
        fill="none" stroke="#7AD9E5" stroke-width="1.8"/>
  <line x1="27" y1="38" x2="27" y2="43" stroke="#7AD9E5" stroke-width="1.4"/>
  <line x1="32" y1="38" x2="32" y2="43" stroke="#7AD9E5" stroke-width="1.4"/>
  <line x1="37" y1="38" x2="37" y2="43" stroke="#7AD9E5" stroke-width="1.4"/>

  <!-- Ears / side ports -->
  <rect x="7"  y="26" width="5" height="10" rx="1.5" fill="#5BE9B9"/>
  <rect x="52" y="26" width="5" height="10" rx="1.5" fill="#5BE9B9"/>

  <!-- Neck -->
  <rect x="27" y="48" width="10" height="6" fill="#11172A" stroke="#5BE9B9" stroke-width="2"/>
</svg>
